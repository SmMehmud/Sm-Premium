<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>SM Premium 👑 Admin</title>
  <link rel="stylesheet" href="css/admin.css" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, push, set, update, remove, get }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD-Jghs-vQjiCAxT1HPpixZd7tBRy_dy5c",
      authDomain: "sm-premium-697f2.firebaseapp.com",
      projectId: "sm-premium-697f2",
      storageBucket: "sm-premium-697f2.firebasestorage.app",
      messagingSenderId: "1043748679307",
      appId: "1:1043748679307:web:dd62fa7b134542f8792e8e",
      measurementId: "G-7DFZRDXQ99",
      databaseURL: "https://sm-premium-697f2-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let isAdmin = false;

    // ── Auth State ──
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await get(ref(db, `admins/${user.uid}`));
        if (snap.exists()) {
          currentUser = user;
          isAdmin = true;
          showPanel();
          loadDashboard();
        } else {
          await signOut(auth);
          showToast('অ্যাডমিন অ্যাক্সেস নেই ❌');
          showLogin();
        }
      } else {
        showLogin();
      }
    });

    // ── Login ──
    window.adminLogin = async function() {
      const email = document.getElementById('admin-email').value.trim();
      const pass = document.getElementById('admin-pass').value;
      if (!email || !pass) { showToast('সব ঘর পূরণ করুন'); return; }
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        showToast('লগইন ব্যর্থ: ' + (e.code === 'auth/wrong-password' ? 'ভুল পাসওয়ার্ড' : 'ভুল ইমেইল'));
      }
    };

    window.adminLogout = async function() {
      await signOut(auth);
    };

    function showLogin() {
      document.getElementById('admin-login').style.display = 'flex';
      document.getElementById('admin-panel').style.display = 'none';
    }

    function showPanel() {
      document.getElementById('admin-login').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
    }

    // ── Tab Navigation ──
    window.showTab = function(tab) {
      document.querySelectorAll('.admin-tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
      if (tab === 'offers') loadAdminOffers();
      if (tab === 'news') loadAdminNews();
      if (tab === 'reports') loadReports();
      if (tab === 'settings') loadAdminSettings();
    };

    // ── Dashboard ──
    function loadDashboard() {
      onValue(ref(db, 'offers'), snap => {
        document.getElementById('stat-offers').textContent = snap.exists() ? Object.keys(snap.val()).length : 0;
      });
      onValue(ref(db, 'reports'), snap => {
        document.getElementById('stat-reports').textContent = snap.exists() ? Object.keys(snap.val()).length : 0;
      });
      onValue(ref(db, 'users'), snap => {
        document.getElementById('stat-users').textContent = snap.exists() ? Object.keys(snap.val()).length : 0;
      });
      onValue(ref(db, 'news'), snap => {
        document.getElementById('stat-news').textContent = snap.exists() ? Object.keys(snap.val()).length : 0;
      });
    }

    // ── Offers ──
    function loadAdminOffers() {
      onValue(ref(db, 'offers'), snap => {
        const data = snap.val() || {};
        const offers = Object.entries(data).map(([id, o]) => ({ id, ...o }));
        const container = document.getElementById('admin-offers-list');
        container.innerHTML = offers.length ? offers.map(o => `
          <div class="admin-card">
            <div class="admin-card-left">
              ${o.pic ? `<img src="${o.pic}" class="admin-offer-img" />` : '<div class="admin-offer-img-placeholder">📦</div>'}
              <div>
                <p class="admin-card-title">${o.name}</p>
                <p class="admin-card-sub">${o.category || ''} ${o.price ? '• ৳'+o.price : ''} ${o.discount ? '• -'+o.discount+'%' : ''}</p>
                <span class="admin-badge ${o.stockOut ? 'badge-danger' : 'badge-success'}">${o.stockOut ? 'STOCK OUT' : 'ACTIVE'}</span>
              </div>
            </div>
            <div class="admin-card-actions">
              <button class="admin-btn edit" onclick="editOffer('${o.id}')">✏️</button>
              <button class="admin-btn danger" onclick="deleteOffer('${o.id}')">🗑️</button>
            </div>
          </div>`).join('') : '<p class="empty">কোনো অফার নেই</p>';
      }, { onlyOnce: true });
    }

    window.showAddOfferForm = function() {
      document.getElementById('offer-form-modal').classList.add('active');
      document.getElementById('offer-form-title').textContent = 'নতুন অফার যোগ করুন';
      document.getElementById('offer-form').reset();
      document.getElementById('offer-edit-id').value = '';
    };

    window.editOffer = async function(id) {
      const snap = await get(ref(db, `offers/${id}`));
      const o = snap.val();
      document.getElementById('offer-form-modal').classList.add('active');
      document.getElementById('offer-form-title').textContent = 'অফার এডিট করুন';
      document.getElementById('offer-edit-id').value = id;
      document.getElementById('f-name').value = o.name || '';
      document.getElementById('f-category').value = o.category || '';
      document.getElementById('f-price').value = o.price || '';
      document.getElementById('f-discount').value = o.discount || '';
      document.getElementById('f-pic').value = o.pic || '';
      document.getElementById('f-desc').value = o.description || '';
      document.getElementById('f-stock').checked = o.stockOut || false;
    };

    window.saveOffer = async function() {
      const id = document.getElementById('offer-edit-id').value;
      const data = {
        name: document.getElementById('f-name').value.trim(),
        category: document.getElementById('f-category').value,
        price: document.getElementById('f-price').value || '',
        discount: document.getElementById('f-discount').value || '',
        pic: document.getElementById('f-pic').value.trim(),
        description: document.getElementById('f-desc').value.trim(),
        stockOut: document.getElementById('f-stock').checked,
        updatedAt: Date.now()
      };
      if (!data.name) { showToast('অফারের নাম দিন'); return; }
      if (id) { await update(ref(db, `offers/${id}`), data); }
      else { data.createdAt = Date.now(); await push(ref(db, 'offers'), data); }
      showToast('অফার সেভ হয়েছে ✅');
      closeOfferForm();
      loadAdminOffers();
    };

    window.deleteOffer = async function(id) {
      if (!confirm('এই অফার ডিলেট করবেন?')) return;
      await remove(ref(db, `offers/${id}`));
      showToast('অফার ডিলেট হয়েছে');
      loadAdminOffers();
    };

    window.closeOfferForm = function() {
      document.getElementById('offer-form-modal').classList.remove('active');
    };

    // ── News ──
    function loadAdminNews() {
      onValue(ref(db, 'news'), snap => {
        const data = snap.val() || {};
        const posts = Object.entries(data).map(([id, n]) => ({ id, ...n }))
          .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        const container = document.getElementById('admin-news-list');
        container.innerHTML = posts.length ? posts.map(p => `
          <div class="admin-card">
            <div class="admin-card-left">
              <div>
                <p class="admin-card-title">${p.text?.substring(0, 60) || ''}...</p>
                ${p.imageUrl ? `<img src="${p.imageUrl}" class="admin-news-thumb" />` : ''}
              </div>
            </div>
            <div class="admin-card-actions">
              <button class="admin-btn danger" onclick="deleteNews('${p.id}')">🗑️</button>
            </div>
          </div>`).join('') : '<p class="empty">কোনো নিউজ নেই</p>';
      }, { onlyOnce: true });
    }

    window.postNews = async function() {
      const text = document.getElementById('news-text').value.trim();
      const imageUrl = document.getElementById('news-img-url').value.trim();
      const link = document.getElementById('news-link').value.trim();
      if (!text) { showToast('নিউজ টেক্সট লিখুন'); return; }
      await push(ref(db, 'news'), { text, imageUrl, link, createdAt: Date.now() });
      showToast('নিউজ পোস্ট হয়েছে ✅');
      document.getElementById('news-text').value = '';
      document.getElementById('news-img-url').value = '';
      document.getElementById('news-link').value = '';
      loadAdminNews();
    };

    window.deleteNews = async function(id) {
      if (!confirm('এই নিউজ ডিলেট করবেন?')) return;
      await remove(ref(db, `news/${id}`));
      showToast('নিউজ ডিলেট হয়েছে');
      loadAdminNews();
    };

    // ── Reports ──
    function loadReports() {
      onValue(ref(db, 'reports'), snap => {
        const data = snap.val() || {};
        const reports = Object.entries(data).map(([id, r]) => ({ id, ...r }))
          .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        const container = document.getElementById('admin-reports-list');
        container.innerHTML = reports.length ? reports.map(r => `
          <div class="admin-card report-card">
            <div>
              <p class="report-name">👤 ${r.name} — 📍 ${r.district}</p>
              <p class="report-email">📧 ${r.email}</p>
              <p class="report-msg">${r.message}</p>
            </div>
            <button class="admin-btn danger" onclick="deleteReport('${r.id}')">🗑️</button>
          </div>`).join('') : '<p class="empty">কোনো রিপোর্ট নেই</p>';
      }, { onlyOnce: true });
    }

    window.deleteReport = async function(id) {
      await remove(ref(db, `reports/${id}`));
      showToast('রিপোর্ট ডিলেট হয়েছে');
      loadReports();
    };

    // ── Settings ──
    function loadAdminSettings() {
      onValue(ref(db, 'settings'), snap => {
        const data = snap.val() || {};
        const c = data.contact || {};
        const d = data.developer || {};
        document.getElementById('s-telegram').value = c.telegram || '';
        document.getElementById('s-whatsapp').value = c.whatsapp || '';
        document.getElementById('s-facebook').value = c.facebook || '';
        document.getElementById('s-dev-name').value = d.name || '';
        document.getElementById('s-dev-pic').value = d.pic || '';
        document.getElementById('s-dev-district').value = d.district || '';
        document.getElementById('s-dev-bio').value = d.bio || '';
        document.getElementById('s-dev-telegram').value = d.telegram || '';
        document.getElementById('s-dev-facebook').value = d.facebook || '';
      }, { onlyOnce: true });
    }

    window.saveSettings = async function() {
      await update(ref(db, 'settings/contact'), {
        telegram: document.getElementById('s-telegram').value.trim(),
        whatsapp: document.getElementById('s-whatsapp').value.trim(),
        facebook: document.getElementById('s-facebook').value.trim(),
        name: 'SM MEHMUD'
      });
      await update(ref(db, 'settings/developer'), {
        name: document.getElementById('s-dev-name').value.trim(),
        pic: document.getElementById('s-dev-pic').value.trim(),
        district: document.getElementById('s-dev-district').value.trim(),
        bio: document.getElementById('s-dev-bio').value.trim(),
        telegram: document.getElementById('s-dev-telegram').value.trim(),
        facebook: document.getElementById('s-dev-facebook').value.trim()
      });
      showToast('সেটিংস সেভ হয়েছে ✅');
    };

    // ── Toast ──
    window.showToast = function(msg) {
      const t = document.getElementById('admin-toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    };
  </script>
</head>
<body class="admin-body">

<!-- LOGIN -->
<div id="admin-login" class="admin-login-screen">
  <div class="admin-login-box">
    <div class="admin-login-logo">
      <span class="logo-sm">SM</span><span class="logo-premium">PREMIUM</span><span class="logo-crown">👑</span>
    </div>
    <p class="admin-login-sub">Admin Panel</p>
    <input type="email" id="admin-email" placeholder="অ্যাডমিন ইমেইল" class="admin-input" />
    <input type="password" id="admin-pass" placeholder="পাসওয়ার্ড" class="admin-input" />
    <button class="admin-login-btn" onclick="adminLogin()">🔐 লগইন</button>
  </div>
</div>

<!-- PANEL -->
<div id="admin-panel" style="display:none;">

  <!-- Header -->
  <header class="admin-header">
    <div class="admin-logo">
      <span class="logo-sm">SM</span><span class="logo-premium">PREMIUM</span><span class="logo-crown">👑</span>
      <span class="admin-label">Admin</span>
    </div>
    <button class="admin-logout-btn" onclick="adminLogout()">🚪</button>
  </header>

  <!-- Stats -->
  <div class="admin-stats">
    <div class="stat-card"><span id="stat-offers">0</span><p>অফার</p></div>
    <div class="stat-card"><span id="stat-users">0</span><p>ইউজার</p></div>
    <div class="stat-card"><span id="stat-news">0</span><p>নিউজ</p></div>
    <div class="stat-card"><span id="stat-reports">0</span><p>রিপোর্ট</p></div>
  </div>

  <!-- Tabs -->
  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="offers" onclick="showTab('offers')">🛍️ অফার</button>
    <button class="tab-btn" data-tab="news" onclick="showTab('news')">🗞️ নিউজ</button>
    <button class="tab-btn" data-tab="reports" onclick="showTab('reports')">🗳️ রিপোর্ট</button>
    <button class="tab-btn" data-tab="settings" onclick="showTab('settings')">⚙️ সেটিংস</button>
  </div>

  <div class="admin-content">

    <!-- OFFERS TAB -->
    <div class="admin-tab-content active" id="tab-offers">
      <button class="add-btn glow-btn" onclick="showAddOfferForm()">➕ নতুন অফার যোগ করুন</button>
      <div id="admin-offers-list"><div class="loading-spinner"></div></div>
    </div>

    <!-- NEWS TAB -->
    <div class="admin-tab-content" id="tab-news">
      <div class="news-post-form">
        <textarea id="news-text" placeholder="নিউজ বা আপডেট লিখুন..." class="admin-input admin-textarea"></textarea>
        <input type="url" id="news-img-url" placeholder="ছবির URL (ঐচ্ছিক)" class="admin-input" />
        <input type="url" id="news-link" placeholder="লিংক (ঐচ্ছিক)" class="admin-input" />
        <button class="add-btn glow-btn" onclick="postNews()">📤 পোস্ট করুন</button>
      </div>
      <div id="admin-news-list"></div>
    </div>

    <!-- REPORTS TAB -->
    <div class="admin-tab-content" id="tab-reports">
      <div id="admin-reports-list"><div class="loading-spinner"></div></div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="admin-tab-content" id="tab-settings">
      <div class="settings-section">
        <h3 class="settings-title">📲 যোগাযোগ তথ্য</h3>
        <input type="url" id="s-telegram" placeholder="Telegram লিংক" class="admin-input" />
        <input type="url" id="s-whatsapp" placeholder="WhatsApp লিংক" class="admin-input" />
        <input type="url" id="s-facebook" placeholder="Facebook লিংক" class="admin-input" />

        <h3 class="settings-title">💻 Developer তথ্য</h3>
        <input type="text" id="s-dev-name" placeholder="Developer নাম" class="admin-input" />
        <input type="url" id="s-dev-pic" placeholder="Developer ছবির URL" class="admin-input" />
        <input type="text" id="s-dev-district" placeholder="জেলা" class="admin-input" />
        <textarea id="s-dev-bio" placeholder="Bio" class="admin-input admin-textarea small"></textarea>
        <input type="url" id="s-dev-telegram" placeholder="Developer Telegram" class="admin-input" />
        <input type="url" id="s-dev-facebook" placeholder="Developer Facebook" class="admin-input" />

        <button class="add-btn glow-btn" onclick="saveSettings()">💾 সেভ করুন</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Offer Form Modal ── -->
<div class="modal-overlay" id="offer-form-modal">
  <div class="modal-box large">
    <button class="modal-close" onclick="closeOfferForm()">✕</button>
    <h3 class="modal-title" id="offer-form-title">অফার যোগ করুন</h3>
    <input type="hidden" id="offer-edit-id" />
    <form id="offer-form" onsubmit="return false;">
      <input type="text" id="f-name" placeholder="অফারের নাম *" class="admin-input" required />
      <input type="text" id="f-category" placeholder="ক্যাটাগরি লিখুন (যেমন: Gaming, VPN, AI Tools, বিনোদন)" class="admin-input" required />
      <input type="number" id="f-price" placeholder="মূল্য (৳)" class="admin-input" />
      <input type="number" id="f-discount" placeholder="ডিসকাউন্ট (%)" class="admin-input" min="0" max="100" />
      <input type="url" id="f-pic" placeholder="ছবির URL" class="admin-input" />
      <textarea id="f-desc" placeholder="বিবরণ" class="admin-input admin-textarea small"></textarea>
      <label class="admin-checkbox-label">
        <input type="checkbox" id="f-stock" /> স্টক আউট করুন
      </label>
      <button class="add-btn glow-btn" onclick="saveOffer()">💾 সেভ করুন</button>
    </form>
  </div>
</div>

<div id="admin-toast" class="toast"></div>
</body>
</html>
